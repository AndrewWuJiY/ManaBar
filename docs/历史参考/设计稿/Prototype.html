<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>cc-bar · Interactive Prototype</title>
<link rel="stylesheet" href="styles.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body { font-family: var(--font-sf); }
  @keyframes popIn {
    from { opacity: 0; transform: translateY(-6px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes winIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes hintFade {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="mac-frames.jsx"></script>
<script type="text/babel" src="artboards/menubar.jsx"></script>
<script type="text/babel" src="artboards/popover.jsx"></script>
<script type="text/babel" src="artboards/hud.jsx"></script>
<script type="text/babel" src="artboards/stats.jsx"></script>
<script type="text/babel" src="artboards/prefs.jsx"></script>
<script type="text/babel" src="prototype-app.jsx"></script>

<script type="text/babel">
ReactDOM.createRoot(document.getElementById('root')).render(<PrototypeApp/>);
</script>
</body>
</html>
